<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCARA AR - Scanner</title>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      color: white;
      overflow: hidden;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
    }
    .overlay-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 230px;
      height: 230px;
      z-index: 2;
    }
    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #00ffcc;
      border-style: solid;
    }
    .corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .scan-line {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 230px;
      height: 2px;
      background: linear-gradient(to right, transparent, #00ffcc, transparent);
      z-index: 3;
      animation: scan 2s linear infinite;
      top: calc(50% - 115px);
    }
    @keyframes scan {
      0%   { top: calc(50% - 110px); opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(50% + 5px); opacity: 0; }
    }
    .titulo {
      position: fixed;
      top: 48px;
      width: 100%;
      text-align: center;
      z-index: 5;
      font-size: 18px;
      font-weight: 600;
      color: #00ffcc;
      letter-spacing: 1px;
    }
    .subtitulo {
      position: fixed;
      top: 76px;
      width: 100%;
      text-align: center;
      z-index: 5;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    .label {
      position: fixed;
      bottom: 60px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      width: 100%;
      z-index: 5;
    }
    .sombra {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.45);
      z-index: 1;
    }
    .detectado {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #00ffcc;
      color: #000;
      font-weight: bold;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 10;
      display: none;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div class="sombra"></div>
  <p class="titulo">SCARA AR</p>
  <p class="subtitulo">Sistema de Realidad Aumentada</p>
  <div class="overlay-box">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div class="scan-line"></div>
  <p class="label">Apunta al código QR del robot SCARA</p>
  <div class="detectado" id="detectado">✓ QR Detectado — Abriendo AR...</div>

  <script>
    const codeReader = new ZXing.BrowserQRCodeReader();
    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
      if (result) {
        document.getElementById('detectado').style.display = 'block';
        setTimeout(() => {
          window.location.href = 'ar.html';
        }, 800);
      }
    });
  </script>
</body>
</html>
